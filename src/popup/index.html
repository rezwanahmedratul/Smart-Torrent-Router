<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Torrent Router</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header>
      <h1>
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
        </svg>
        Torrent Router
      </h1>
      <div style="display: flex; align-items: center; gap: 8px;">
        <div class="switch-container" title="Enable/Disable Interception">
          <span class="switch-label">Active</span>
          <label class="switch">
            <input type="checkbox" id="extension-toggle" checked />
            <span class="slider"></span>
          </label>
        </div>
        <div id="conn-badge" class="status-indicator">
          <span id="conn-dot" class="status-dot"></span>
          <span id="conn-text">Checking...</span>
        </div>
      </div>
    </header>

    <main class="content">
      <!-- Disconnected Warn Panel -->
      <div id="conn-warn" class="discon-alert" style="display: none;">
        <p>qBittorrent is offline or unconfigured</p>
        <button id="btn-go-settings" class="btn btn-primary btn-full btn-small">Configure Server</button>
      </div>

      <!-- Paste Magnet Link Panel -->
      <section class="quick-send">
        <label for="magnet-url">Send Magnet Link</label>
        <textarea
          id="magnet-url"
          class="textarea-control"
          placeholder="paste magnet:?xt=urn:btih:..."
        ></textarea>
        <button id="btn-send-magnet" class="btn btn-primary btn-full">
          Analyze & Send
        </button>
        <div id="send-result" style="display: none; text-align: center; font-size: 0.8rem; font-weight: 500;"></div>
      </section>

      <!-- Drag & Drop Torrent File Section -->
      <section class="quick-send">
        <label>Upload Torrent File</label>
        <div id="drop-zone" class="drop-zone">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-bottom: 4px;">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
          </svg>
          <span class="drop-text">Drag & drop .torrent or <strong>browse</strong></span>
          <input type="file" id="torrent-file-input" accept=".torrent" style="display: none;" />
        </div>
        <div id="upload-result" style="display: none; text-align: center; font-size: 0.8rem; font-weight: 500;"></div>
      </section>

      <!-- Active Jobs Panel -->
      <section>
        <h2 class="section-title">Router Activity</h2>
        <div id="jobs-container" class="jobs-list">
          <div class="no-jobs">No recent router activity</div>
        </div>
      </section>
    </main>

    <footer>
      <span id="btn-clear-history" class="settings-link" title="Clear completed and failed jobs from list">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        Clear History
      </span>
      <span id="btn-open-options" class="settings-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.5 1z"></path>
        </svg>
        Settings
      </span>
    </footer>

    <script type="module" src="index.ts"></script>
  </body>
</html>
